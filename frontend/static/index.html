<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Weiterleitung zum Wunschmanager</title>
  <link rel="icon" type="image/x-icon" href="app/assets/wunschmanager.svg">
  <script>
    window.location.href = '/app/index.html' + window.location.search;
  </script>
</head>
<body>
<p>
  Wenn Sie nicht automatisch weitergeleitet werden,
  <a id="fallback-link" href="/app/index.html">klicken Sie bitte hier</a>.
</p>
<script>
  document.getElementById('fallback-link').href += window.location.search;
</script>
</body>
</html>
