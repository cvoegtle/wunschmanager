<div>
  @if (!selected) {
    <button mat-icon-button (click)="toggleSelection()" matTooltip="auswählen">
      <i class="material-icons">radio_button_unchecked</i>
    </button>
  }
  @if (selected) {
    <button mat-icon-button (click)="toggleSelection()" matTooltip="ausgewählt">
      <i class="material-icons">check_circle_outline</i>
    </button>
  }
</div>
