<mat-accordion>
  @for (list of wishLists; track list) {
    <wish-list-edit [wishList]="list" [wishIds]="currentSelection" [user]="list.managed ? user : null"
      (deleted)="onDeleteList($event)"
    (updated)="onUpdateEvent($event)" (duplicate)="onDuplicate($event)" (selection)="onSelection($event)"></wish-list-edit>
  }
</mat-accordion>
<form class="wish-list-create">
  <mat-form-field class="wish-list-name">
    <input matInput placeholder="Neue Wunschliste" [(ngModel)]="newWishListEvent" name="newWishListInput">
  </mat-form-field>
  <mat-checkbox class="wish-list-managed" [(ngModel)]="newListIsManaged" name="newListIsManagedInput">verwalten
  </mat-checkbox>
  <button (click)="createWishList()" color="primary" [disabled]="!isCreatePossible()" mat-raised-button>anlegen</button>
</form>
<div class="divider"></div>
<all-shared [user]="user" [sharedWishLists]="sharedWishLists" (selection)="onSelection($event)"></all-shared>
