@if (editMode) {
  <div class="wish-line">
    <mat-form-field class="wish-full-width">
      <mat-label>Beschreibung</mat-label>
      <textarea matInput placeholder="Beschreibung" [(ngModel)]="content.description" [disabled]="viewMode" matTextareaAutosize
      (change)="onContentChanged()" matAutosizeMinRows="1" matAutosizeMaxRows="5" name="editDescription"></textarea>
    </mat-form-field>
  </div>
}
@if (viewMode) {
  <div class="description">{{content.description}}</div>
}
@if (editMode) {
  <div class="wish-line">
    <mat-form-field class="wish-url">
      <mat-label>Link</mat-label>
      <input matInput [(ngModel)]="content.link" (change)="onContentChanged()" name="editLink">
    </mat-form-field>
    @if (content.link) {
      <a mat-icon-button target="_blank" href="{{targetUrl()}}" matTooltip="Seite öffnen">
        <i class="material-icons">link</i>
      </a>
    }
  </div>
}
@if (viewMode && !content.description) {
  <div class="description">{{content.link}}</div>
}
