<h1 mat-dialog-title>{{wish.caption}} reservieren</h1>
<div mat-dialog-content>
  <div class="participate-dialog">
    <mat-form-field class="reserve-donor">
      <input #real_donor placeholder="für wen" matInput [(ngModel)]="dialogResult.donor" cdkFocusInitial/>
    </mat-form-field>

    <mat-form-field class="participation-amount">
      <input #amount placeholder="Anteil" matInput type="number" [(ngModel)]="dialogResult.amount"/>
    </mat-form-field>
    <mat-checkbox [(ngModel)]="dialogResult.organiser">ich kümmere mich um die Orga</mat-checkbox>
  </div>
</div>
<div mat-dialog-actions>
  <button mat-raised-button (click)="participate()" >{{dialogResult.donor}} beteiligen</button>
</div>
