<div class="content-area">
  @for (wishList of wishLists; track wishList) {
    <wish-column class="content-column" [wishes]="wishList"  [orderMode]="orderMode" [user]="user"
      (wishChange)="wishChanged($event)"
      (wishSelection)="onWishSelection($event)"
      (reserved)="reserveClicked($event)"
      (orderChange)="onOrderChange()">
    </wish-column>
  }
</div>
