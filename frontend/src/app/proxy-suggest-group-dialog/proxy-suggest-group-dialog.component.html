<h1 mat-dialog-title>{{wish.caption}} reservieren</h1>
<div mat-dialog-content>
  <div class="reserve-dialog">
    <mat-form-field class="reserve-donor">
      <input #real_donor placeholder="für wen" matInput [(ngModel)]="donation.donor" cdkFocusInitial/>
    </mat-form-field>
      <mat-form-field  class="reserve-donor">
        <input matInput type="number" placeholder="Wert in Euro" [(ngModel)]="wish.estimatedPrice" (change)="onWishChange()" name="editPrice">
      </mat-form-field>
      <mat-form-field  class="reserve-donor">
        <input matInput type="number" placeholder="Vorschlag für Beteiligung" [(ngModel)]="wish.suggestedParticipation"
          (change)="onWishChange()" name="editSuggestion">
      </mat-form-field>
      <mat-form-field class="reserve-donor">
        <input #amount placeholder="Anteil" matInput type="number" [(ngModel)]="donation.amount"/>
      </mat-form-field>
      <mat-checkbox [(ngModel)]="donation.organiser">ich kümmere mich um die Orga</mat-checkbox>
  </div>
</div>
<div mat-dialog-actions>
  <button mat-raised-button (click)="reserve()" cdkFocusInitial>
    {{isDonorEmpty() ? "für mich reservieren" : "für " + donation.donor + " reservieren"}}</button>
</div>
