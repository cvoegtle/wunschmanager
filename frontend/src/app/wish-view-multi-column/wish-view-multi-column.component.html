<div class="content-area">
  @for (wishList of wishLists; track wishList) {
    <wish-view-column class="content-column" [wishes]="wishList" [user]="user" [restricted]="restricted"
      (reserved)="reserveClicked($event)"
      (showDonor)="showDonorClicked($event)"
      (wishSelection)="onWishSelection($event)">
    </wish-view-column>
  }
</div>
