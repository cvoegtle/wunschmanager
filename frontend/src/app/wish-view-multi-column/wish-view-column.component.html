<div>
  @for (wish of wishes; track wish) {
    <wish-view [wish]="wish" [user]="user" [restricted]="restricted"
      (showDonor)="showDonorClicked($event)"
      (reserved)="reserveClicked($event)"
      (suggestGroup)="suggestGroupClicked($event)"
    (wishSelected)="onWishSelection($event)"></wish-view>
  }
</div>
