<button mat-icon-button matTooltip="{{getToolTip()}}">
  @if (!reserved && !groupGift) {
    <i class="material-symbols-outlined">hand_package</i>
  }
  @if (reserved) {
    <i class="material-icons">person_remove</i>
  }

  @if (!reserved && groupGift) {
    <i class="material-icons">person_add</i>
  }
</button>
