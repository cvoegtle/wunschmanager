import org.jetbrains.kotlin.gradle.tasks.KotlinCompile

buildscript {    // Configuration for building
    ext.kotlin_version = '2.1.20'
    ext.spring_boot_version = '3.5.4'
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath 'com.google.cloud.tools:appengine-gradle-plugin:+'    // latest App Engine Gradle task
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath "org.jetbrains.kotlin:kotlin-allopen:$kotlin_version"
        classpath "org.springframework.boot:spring-boot-gradle-plugin:$spring_boot_version"
    }
}

apply plugin: 'kotlin'
apply plugin: 'kotlin-spring'
apply plugin: 'org.springframework.boot'
apply plugin: 'io.spring.dependency-management'
apply plugin: 'com.google.cloud.tools.appengine'  // App Engine tasks

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation "org.jetbrains.kotlin:kotlin-reflect:$kotlin_version"
    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'
    // Version is managed by Spring Boot's dependency management plugin
    implementation 'com.fasterxml.jackson.module:jackson-module-kotlin'

    implementation 'com.google.guava:guava:33.3.1-jre'
    implementation 'com.googlecode.objectify:objectify:6.1.2'

    // Versions for these are managed by the Spring Boot plugin, ensuring compatibility
    implementation "org.springframework.boot:spring-boot-starter-web"
    implementation "org.springframework.boot:spring-boot-starter-security"
    implementation "org.springframework.boot:spring-boot-starter-oauth2-client"
    runtimeOnly "org.springframework.boot:spring-boot-starter-tomcat"
    testImplementation "org.springframework.boot:spring-boot-starter-test"
}

springBoot {
    mainClass.set('de.voegtle.wunschmanager.ApplicationKt')
}

bootJar {
    archiveFileName = 'wunschmanager-backend.jar'
}

// [START model]
appengine {  // App Engine tasks configuration
    deploy {
        version = '112'
        projectId = 'wunschmanager'
        stopPreviousVersion = true
        promote = true
    }
    stage { // Explizit das korrekte, ausführbare JAR für das Staging festlegen
        artifact = bootJar.archiveFile.get().asFile
    }
}

def webappDir = "$projectDir/src/main/webapp"

clean {
    dependsOn "cleanupWebApp"
}


task cleanupWebApp(type:Delete) {
    delete fileTree("$webappDir/assets") {
        include "*"
    }
    delete "$webappDir/assets"
    delete fileTree("$webappDir") {
        include "*"
    }
}

repositories {
    mavenCentral()
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    options.release.set(21)
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).all {
    kotlinOptions {
        jvmTarget = "21"
    }
}
